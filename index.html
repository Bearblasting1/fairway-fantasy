<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Fairway Fantasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#fff;font-family:'DM Sans',sans-serif}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f3;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b6b;
  --color-border-tertiary:rgba(0,0,0,0.1);
  --color-border-secondary:rgba(0,0,0,0.2);
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1c1c1e;
    --color-background-secondary:#2c2c2e;
    --color-text-primary:#f2f2f7;
    --color-text-secondary:#aeaeb2;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.2);
  }
}
.wrap{max-width:430px;margin:0 auto;padding:0 0 80px;min-height:100vh;background:var(--color-background-primary)}
.hdr{padding:14px 16px 10px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);position:sticky;top:0;z-index:30}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.app-name{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--color-text-primary)}
.sign-out{font-size:11px;padding:3px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:10px;background:transparent;cursor:pointer;color:var(--color-text-secondary);font-family:'DM Sans',sans-serif;display:none}
.tourn{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;background:#EAF3DE;color:#3B6D11;margin-top:6px}
.dot{width:6px;height:6px;border-radius:50%;background:#639922;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.nav{display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;padding:8px 2px 6px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--color-text-secondary);font-family:'DM Sans',sans-serif}
.nb.on{color:#3B6D11}
.ni{font-size:17px}
.screen{display:none;padding:0 16px}
.screen.on{display:block}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--color-text-secondary);margin:14px 0 8px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sbox{background:var(--color-background-secondary);border-radius:8px;padding:9px 6px;text-align:center}
.sv{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--color-text-primary)}
.sl{font-size:10px;color:var(--color-text-secondary)}
.lbrow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:7px}
.lbpos{font-family:'Bebas Neue',sans-serif;font-size:20px;width:30px;text-align:center;color:var(--color-text-secondary)}
.lbpos.g{color:#BA7517}.lbpos.s{color:#888780}.lbpos.b{color:#993C1D}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.lbi{flex:1;min-width:0}
.lbn{font-size:14px;font-weight:500;color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbs{font-size:11px;color:var(--color-text-secondary)}
.lbsc{font-family:'Bebas Neue',sans-serif;font-size:25px;color:var(--color-text-primary);text-align:right}
.lbsc.win{color:#3B6D11}
.lbu{font-size:10px;color:var(--color-text-secondary);text-align:right}
.bg{background:#EAF3DE;border:0.5px solid #C0DD97;border-radius:8px;padding:10px 14px;font-size:13px;color:#3B6D11;font-weight:500;margin-bottom:10px;text-align:center}
.ba{background:#FAEEDA;border:0.5px solid #FAC775;border-radius:8px;padding:10px 14px;font-size:13px;color:#854F0B;font-weight:500;margin-bottom:10px;text-align:center}
.bcta{background:#EAF3DE;border:0.5px solid #C0DD97;border-radius:12px;padding:14px;margin-bottom:12px;text-align:center}
.bctah{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#3B6D11}
.bctas{font-size:12px;color:#3B6D11;margin:4px 0 10px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:0.5px solid var(--color-border-secondary);border-radius:8px;background:transparent;color:var(--color-text-primary);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;margin-bottom:8px;transition:background .15s}
.btn:active{background:var(--color-background-secondary)}
.btn.g{border-color:#C0DD97;color:#3B6D11;font-weight:500}
.btn.r{border-color:#F09595;color:#A32D2D}
.btn.am{border-color:#FAC775;color:#854F0B;font-weight:500}
.btn.solid{background:#3B6D11;color:white;border-color:#3B6D11;font-weight:500;font-size:15px;padding:14px}
.btn.solid:disabled{background:#888;border-color:#888;cursor:not-allowed;opacity:.5}
.btn:disabled{opacity:.4;cursor:not-allowed}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.lcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer}
.lcard:active{background:var(--color-background-secondary)}
.lav{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
.lname{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.lstat{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.lstat.done{color:#3B6D11}
.pinbox{background:var(--color-background-secondary);border-radius:12px;padding:18px;margin-bottom:10px}
.pinin{width:100%;padding:14px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:20px;background:var(--color-background-primary);color:var(--color-text-primary);text-align:center;letter-spacing:4px;margin-bottom:6px}
.pinerr{font-size:12px;color:#A32D2D;text-align:center;min-height:16px;margin-bottom:8px}
.pinbtns{display:flex;gap:8px}
.pinbtns button{flex:1;padding:10px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-primary)}
.cbadge{font-size:10px;padding:1px 6px;border-radius:8px;background:#E6F1FB;color:#185FA5;margin-left:4px}
.search-wrap{margin-bottom:12px}
.search-label{display:block;font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.search-input{display:block;width:100%;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:16px;border:2px solid #3B6D11;border-radius:10px;background:var(--color-background-primary);color:var(--color-text-primary);-webkit-appearance:none}
.search-input:focus{outline:none;border-color:#185FA5}
.search-input::placeholder{color:var(--color-text-secondary)}
.dpick-top{background:var(--color-background-secondary);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.dpick-counter{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.chip{font-size:11px;padding:4px 10px;border-radius:12px;background:#EAF3DE;color:#3B6D11;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.chip .x{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.plist{border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden;max-height:320px;overflow-y:auto;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.pitem{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.pitem:last-child{border-bottom:none}
.pitem:active:not(.ptaken):not(.pdrafted){background:var(--color-background-secondary)}
.pitem.phl{background:#E6F1FB;border-left:3px solid #185FA5}
.pitem.pdrafted{background:#EAF3DE;cursor:default}
.pitem.ptaken{opacity:.35;cursor:not-allowed}
.pitem-name{flex:1;font-size:14px;color:var(--color-text-primary)}
.pitem.phl .pitem-name{color:#0C447C;font-weight:500}
.pitem.pdrafted .pitem-name{color:#3B6D11}
.pbadge{font-size:10px;padding:2px 7px;border-radius:7px;flex-shrink:0}
.pb-mine{background:#EAF3DE;color:#3B6D11}
.pb-taken{background:var(--color-background-secondary);color:var(--color-text-secondary);font-style:italic}
.pb-hl{background:#E6F1FB;color:#185FA5}
.draft-btn-sticky{position:sticky;bottom:80px;padding:8px 0 0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);margin-top:4px}
.orow{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:6px}
.on2{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--color-text-secondary);width:26px;text-align:center}
.omv{width:32px;height:32px;border:0.5px solid var(--color-border-tertiary);border-radius:5px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--color-text-secondary)}
.omv:disabled{opacity:.2;cursor:not-allowed}
.srow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.srow:last-child{border-bottom:none}
.grow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.grow:last-child{border-bottom:none}
.gn{flex:1;font-size:13px;color:var(--color-text-primary)}
.gt{font-size:10px;color:var(--color-text-secondary);min-width:20px;text-align:right}
.gs{font-family:'Bebas Neue',sans-serif;font-size:17px}
.gs.cnt{color:#3B6D11}.gs.nc{color:var(--color-text-secondary)}.gs.pen{color:#A32D2D}
.gbadge{font-size:9px;padding:2px 5px;border-radius:7px;flex-shrink:0}
.gbadge.top{background:#EAF3DE;color:#3B6D11}.gbadge.cut{background:#FCEBEB;color:#A32D2D}.gbadge.pen{background:#FCEBEB;color:#A32D2D;font-weight:500}
.setlbl{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:block}
.srow2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.scol label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.sel{padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);width:100%}
.shint{font-size:11px;color:var(--color-text-secondary);margin:4px 0 0;line-height:1.5}
.prow{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.pnum{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--color-text-secondary);width:18px;text-align:center;flex-shrink:0}
.pin{flex:1;padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.ppin{width:76px;padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary)}
.rmbtn{width:26px;height:26px;border-radius:50%;border:0.5px solid var(--color-border-tertiary);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--color-text-secondary);flex-shrink:0}
.addbtn{display:flex;align-items:center;gap:5px;padding:7px 10px;border:0.5px dashed var(--color-border-secondary);border-radius:8px;background:transparent;color:var(--color-text-secondary);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;width:100%}
.div{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:14px 0}
.setwrap{position:relative}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.ovbox{background:var(--color-background-primary);border-radius:12px;padding:20px;margin:16px;width:100%;max-width:400px}
.ovt{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
.ovm{font-size:13px;color:var(--color-text-secondary);margin-bottom:14px}
.ovbtns{display:flex;gap:8px}
.ovbtns button{flex:1;padding:9px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;border:0.5px solid var(--color-border-tertiary)}
.ovc{background:transparent;color:var(--color-text-primary)}
.ovo{background:#A32D2D;color:white;border-color:#A32D2D}
.szgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.wbar{height:5px;border-radius:3px;background:var(--color-background-secondary);margin-top:4px;overflow:hidden}
.wfill{height:100%;background:#3B6D11;border-radius:3px}
.tc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;margin-bottom:7px;overflow:hidden}
.th{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer}
.tb{display:none;border-top:0.5px solid var(--color-border-tertiary)}
.tb.open{display:block}
.tr{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.tr:last-child{border-bottom:none}
.tp{font-family:'Bebas Neue',sans-serif;font-size:17px;width:26px;text-align:center;color:var(--color-text-secondary)}
.tp.p1{color:#BA7517}.tp.p2{color:#888780}.tp.p3{color:#993C1D}
.field-list-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:12px;overflow:hidden}
.frow{display:flex;align-items:center;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;color:var(--color-text-primary)}
.frow:last-child{border-bottom:none}
.frank{width:28px;font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--color-text-secondary)}
.sp{display:inline-block;width:13px;height:13px;border:2px solid var(--color-border-tertiary);border-top-color:#3B6D11;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#3B6D11;color:white;padding:8px 16px;border-radius:18px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:99}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-top">
      <span class="app-name">Fairway Fantasy</span>
      <button class="sign-out" id="signout" onclick="logOut()">Sign out</button>
    </div>
    <div class="tourn" id="tourn">Texas Children's Houston Open</div>
    <span class="pill"><span class="dot"></span><span id="lstatus">Loading...</span></span>
  </div>

  <div id="sc-standings" class="screen on">
    <p class="stitle">League Standings</p>
    <div class="sgrid">
      <div class="sbox"><div class="sv" id="st-r">—</div><div class="sl">Round</div></div>
      <div class="sbox"><div class="sv" id="st-f">—</div><div class="sl">Field</div></div>
      <div class="sbox"><div class="sv" id="st-p">—</div><div class="sl">Players</div></div>
    </div>
    <button class="btn" id="refbtn" onclick="refreshScores()"><span id="reficon">↻</span> Refresh scores</button>
    <div id="scta"></div>
    <div id="srows"><div style="text-align:center;padding:20px"><span class="sp"></span></div></div>
  </div>

  <div id="sc-field" class="screen">
    <p class="stitle">Tournament Field</p>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input class="search-input" id="fsearch" placeholder="🔍 Search player..." oninput="filterField(this.value)" autocomplete="off" style="margin:0;flex:1;border-color:var(--color-border-secondary);font-size:14px;padding:10px 14px"/>
      <button class="btn" style="width:auto;padding:10px 14px;margin:0;flex-shrink:0" onclick="loadField()"><span id="fref">↻</span></button>
    </div>
    <div id="fstatus" style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px"></div>
    <div id="flist"></div>
  </div>

  <div id="sc-draft" class="screen">
    <div id="dc"></div>
  </div>

  <div id="sc-rosters" class="screen">
    <p class="stitle">Rosters</p>
    <div id="rosterrows"><div style="text-align:center;padding:20px;font-size:13px;color:var(--color-text-secondary)">Rosters visible after draft locks</div></div>
  </div>

  <div id="sc-settings" class="screen">
    <p class="stitle">League Settings</p>
    <div class="setwrap" id="setwrap">
      <div style="margin-bottom:18px">
        <span class="setlbl">Players &amp; PINs</span>
        <div style="display:grid;grid-template-columns:1fr 76px 26px;gap:6px;margin-bottom:6px">
          <span style="font-size:11px;color:var(--color-text-secondary)">Name</span>
          <span style="font-size:11px;color:var(--color-text-secondary)">PIN</span><span></span>
        </div>
        <div id="pinputs"></div>
        <button class="addbtn" id="addbtn" onclick="addPlayer()">+ Add player</button>
      </div>
      <div style="margin-bottom:18px">
        <span class="setlbl">Commissioner</span>
        <select class="sel" id="csel"></select>
      </div>
      <div style="margin-bottom:18px">
        <span class="setlbl">Draft &amp; Scoring</span>
        <div class="srow2">
          <div class="scol"><label>Picks per player</label>
            <select class="sel" id="pksel" onchange="syncCount()">
              <option value="4">4</option><option value="6">6</option><option value="8">8</option>
              <option value="10" selected>10</option><option value="12">12</option><option value="14">14</option>
            </select>
          </div>
          <div class="scol"><label>Golfers that count</label>
            <select class="sel" id="ctsel"></select>
          </div>
        </div>
        <p class="shint" id="shint"></p>
      </div>
      <button class="btn g" onclick="saveSettings()">Save settings</button>
      <div class="div"></div>
      <span class="setlbl">Tournament Management</span>
      <button class="btn" onclick="showOv('newdraft')">⛳ Start new draft (keep players)</button>
      <button class="btn r" onclick="showOv('clearseason')">🗑 Clear season history</button>
      <button class="btn r" onclick="showOv('clearall')">✕ Reset everything</button>
    </div>
  </div>

  <div id="sc-season" class="screen">
    <p class="stitle">Season Results</p>
    <div id="seasoncontent"></div>
  </div>

  <nav class="nav">
    <button class="nb on" onclick="go('standings',this)"><span class="ni">🏆</span>Standings</button>
    <button class="nb" onclick="go('field',this);loadField()"><span class="ni">⛳</span>Field</button>
    <button class="nb" onclick="go('draft',this);renderDraft()"><span class="ni">📋</span>Draft</button>
    <button class="nb" onclick="go('rosters',this)"><span class="ni">👤</span>Rosters</button>
    <button class="nb" onclick="go('season',this);renderSeason()"><span class="ni">🏅</span>Season</button>
    <button class="nb" onclick="go('settings',this)"><span class="ni">⚙️</span>Settings</button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div id="ovportal"></div>

<script>

// ── SUPABASE SYNC ─────────────────────────────────────────────

const LEAGUE_ID = 'main';

const SUPA_HEADERS = {

async function supaGet() {
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/league_state?id=eq.' + LEAGUE_ID + '&select=state', {
      headers: SUPA_HEADERS
    });
    if (!res.ok) { console.error('Supabase GET failed', res.status); return null; }
    const rows = await res.json();
    return rows?.[0]?.state || null;
  } catch(e) { console.error('Supabase GET error', e); return null; }
}

async function supaSet(state) {
  try {
    const res = await fetch(SUPA_URL + '/rest/v1/league_state', {
      method: 'POST',
      headers: SUPA_HEADERS,
      body: JSON.stringify({ id: LEAGUE_ID, state, updated_at: new Date().toISOString() })
    });
    if (!res.ok) { const t = await res.text(); console.error('Supabase POST failed', res.status, t); }
  } catch(e) { console.error('Supabase POST error', e); }
}

function getOrder(){if(S.draftOrder&&S.draftOrder.length===S.players.length)return S.draftOrder;return S.players.map((_,i)=>i);}

// Returns the player index (pi) whose turn it currently is
function getCurrentTurn(){
  const order=getOrder();
  const n=order.length;
  const pp=S.picksPerPlayer;
  // Count total picks made so far
  let totalPicks=0;
  // In snake draft, round r (0-indexed), slot s (0-indexed) = player order[s] if r even, order[n-1-s] if r odd
  // We need to find who has the fewest picks considering snake order
  // Build the full snake sequence
  const sequence=[];
  for(let r=0;r<pp;r++){
    for(let s=0;s<n;s++){
      const pi=r%2===0?order[s]:order[n-1-s];
      sequence.push(pi);
    }
  }
  // Find first slot in sequence where that player doesn't have a pick yet
  for(let i=0;i<sequence.length;i++){
    const pi=sequence[i];
    const picks=S.draftPicks[pi]||[];
    // How many picks should this player have at position i?
    // Count how many times pi appears in sequence[0..i-1]
    const prevPicks=sequence.slice(0,i).filter(x=>x===pi).length;
    if(picks.length<=prevPicks) return pi;
  }
  return -1; // all done
}

function getTurnDisplay(){
  const pi=getCurrentTurn();
  if(pi===-1) return 'All picks complete';
  const order=getOrder();
  const slot=order.indexOf(pi)+1;
  // Which overall pick number is this?
  const totalSoFar=(S.draftPicks||[]).reduce((s,p)=>s+(p||[]).length,0);
  return `Pick #${totalSoFar+1} · ${S.players[pi].name}'s turn (slot #${slot})`;
}

function dl(){const v=Object.values(liveScores).map(s=>s.toPar);return v.length?Math.max(...v):10;}
function scoreFor(name){if(liveScores[name])return liveScores[name];const last=name.split(' ').pop().toLowerCase();const k=Object.keys(liveScores).find(k=>k.split(' ').pop().toLowerCase()===last);return k?liveScores[k]:null;}
function calcScore(picks){
  const topN=S.countingPlayers,pen=dl();
  const ws=picks.map(name=>{const s=scoreFor(name);return s?{name,...s}:{name,toPar:0,thru:'—',madeCut:true,pos:999};});
  const active=ws.filter(g=>g.madeCut!==false).sort((a,b)=>a.toPar-b.toPar);
  const counting=active.slice(0,topN);const penCount=Math.max(0,topN-counting.length);
  const total=counting.reduce((s,g)=>s+g.toPar,0)+(penCount*pen);
  return{total,counting,penCount,pen,activeCount:active.length,topN,ws};
}
function bestPos(picks){return picks.map(n=>{const s=scoreFor(n);return s?parseInt(s.pos)||999:999;}).sort((a,b)=>a-b);}
function cmpS(a,b){if(a.total!==b.total)return a.total-b.total;const pA=bestPos(a.picks),pB=bestPos(b.picks),len=Math.max(pA.length,pB.length);for(let i=0;i<len;i++){const pa=pA[i]??9999,pb=pB[i]??9999;if(pa!==pb)return pa-pb;}return 0;}

function buildRows(pi,players,mySet,takenMap,hlName,remaining){
  if(!players.length)return`<div style="text-align:center;padding:20px;font-size:13px;color:var(--color-text-secondary)">No players match</div>`;
  return players.map(name=>{
    const isMine=mySet.has(name),takenBy=takenMap[name],isTaken=!!takenBy&&!isMine,isFull=!isMine&&remaining<=0,isHL=name===hlName;
    let cls=isMine?'pdrafted':isTaken?'ptaken':isHL?'phl':'';if(isFull&&!isMine&&!isTaken)cls='ptaken';
    const safe=name.replace(/'/g,"\\'").replace(/"/g,'&quot;');

async function confirmDraft(pi){
  if(syncing){toast('Syncing — please wait a moment',true);return;}
  // Enforce turn order
  const currentTurnPi=getCurrentTurn();
  if(currentTurnPi!==-1&&currentTurnPi!==pi){
    toast(`It's ${S.players[currentTurnPi].name}'s turn, not yours!`,true);
    return;
  }
  const name=hl[pi];if(!name)return;
  if(!S.draftPicks[pi])S.draftPicks[pi]=[];
  if(S.draftPicks[pi].length>=S.picksPerPlayer){toast('Pick limit reached',true);return;}

  // Pull latest from cloud first to catch any picks made on other devices
  const btn=document.getElementById('db'+pi);
  if(btn){btn.disabled=true;btn.textContent='Syncing...';}
  const remote = await supaGet();
  if(remote){
    // Check if someone else already took this golfer
    const allTaken = new Set(Object.entries(remote.draftPicks||{})
      .filter(([k])=>parseInt(k)!==pi)
      .flatMap(([,v])=>v||[]));
    if(allTaken.has(name)){
      // Update local state with remote
      S = {...def(),...remote};
      save();
      toast(`${name} was just taken by someone else!`,true);
      renderPicks(document.getElementById('dc'),pi);
      return;
    }
    // Merge remote picks for other players into local state
    if(remote.draftPicks){
      Object.keys(remote.draftPicks).forEach(k=>{
        if(parseInt(k)!==pi) S.draftPicks[parseInt(k)] = remote.draftPicks[k];
      });
    }
  }

  // Safe to draft
  S.draftPicks[pi].push(name);
  hl[pi]=null;
  await syncUp();
  toast(`✓ ${name} drafted!`);
  renderPicks(document.getElementById('dc'),pi);
  renderStandings();
}

// Auto-sync draft state every 8 seconds when draft screen is visible
setInterval(async () => {
  const draftScreen = document.getElementById('sc-draft');
  if (!draftScreen || !draftScreen.classList.contains('on')) return;
  if (syncing) return;
  const remote = await supaGet();
  if (!remote) return;
  // Silently merge remote picks into local state
  let changed = false;
  if (remote.draftPicks) {
    Object.keys(remote.draftPicks).forEach(k => {
      const pi = parseInt(k);
      const remPicks = remote.draftPicks[k] || [];
      const locPicks = S.draftPicks[pi] || [];
      // Only update other players' picks, not the current logged-in user
      if (pi !== loggedInAs) {
        const remStr = JSON.stringify(remPicks);
        const locStr = JSON.stringify(locPicks);
        if (remStr !== locStr) {
          S.draftPicks[pi] = remPicks;
          changed = true;
        }
      }
    });
  }
  // Also sync lock state and order finalized
  if (remote.draftLocked !== S.draftLocked) { S.draftLocked = remote.draftLocked; changed = true; }
  if (remote.draftOrderFinalized !== S.draftOrderFinalized) { S.draftOrderFinalized = remote.draftOrderFinalized; changed = true; }
  if (changed) {
    save();
    renderStandings();
    // Re-render pick screen if open to show updated taken status
    const dc = document.getElementById('dc');
    if (dc && loggedInAs !== null && loggedInAs !== S.commissioner) {
      renderPicks(dc, loggedInAs);
    } else if (dc && loggedInAs === S.commissioner && S.draftOrderFinalized) {
      renderCommDraft(dc);
    }
  }
}, 8000);

(function() {
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.style.cssText = 'border-color:#B5D4F4;color:#185FA5;margin-bottom:8px';
